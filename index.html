<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verilog Flow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            color:white;
        }

        header{
            padding:40px 8%;
            display:flex;
            justify-content:space-between;
            align-items:center;
            min-height:70vh;
        }

        /* LEFT SIDE */
        .left{
            max-width:600px;
            animation:fadeIn 1.5s ease-in-out;
        }

        .left h1{
            font-size:42px;
            font-weight:600;
            margin-bottom:15px;
        }

        .typing{
            font-size:17px;
            color:#00e6ff;
            border-right:2px solid #00e6ff;
            white-space:nowrap;
            overflow:hidden;
            width:0;
            animation:typing 5s steps(60,end) forwards,
                      blink .8s infinite;
        }

        /* RIGHT SIDE */
        .right{
            text-align:center;
            animation:fadeIn 2s ease-in-out;
        }

        .right img{
            width:170px;
            height:170px;
            border-radius:50%;
            border:3px solid #00e6ff;
            object-fit:cover;
            margin-bottom:15px;
        }

        .right a{
            text-decoration:none;
            color:white;
            font-size:14px;
            background:#00e6ff;
            padding:8px 18px;
            border-radius:20px;
            display:inline-block;
            transition:0.3s;
        }

        .right a:hover{
            background:white;
            color:#0f2027;
        }

        /* ANIMATIONS */
        @keyframes typing{
            from{width:0}
            to{width:100%}
        }

        @keyframes blink{
            50%{border-color:transparent}
        }

        @keyframes fadeIn{
            from{opacity:0; transform:translateY(20px);}
            to{opacity:1; transform:translateY(0);}
        }

        /* RESPONSIVE */
        @media(max-width:900px){
            header{
                flex-direction:column;
                text-align:center;
                gap:40px;
            }
            .typing{
                white-space:normal;
                border:none;
                animation:none;
                width:100%;
            }
        }
    </style>
</head>
<body>

<header>

    <!-- LEFT CONTENT -->
    <div class="left">
        <h1>Verilog Flow</h1>

        <p class="typing">
            A structured repository of Verilog HDL programs covering 
            combinational and sequential circuits, FSM design, and 
            verification testbenches for mastering digital design.
        </p>
    </div>

    <!-- RIGHT CONTENT -->
    <div class="right">
        <!-- Replace profile.jpg with your image file name -->
        <img src="profile.jpg" alt="Profile Picture">

        <br>

        <a href="https://www.linkedin.com/in/neha-s-28551326a/" target="_blank">
            Visit My Profile
        </a>
    </div>

</header>

</body>
</html>
