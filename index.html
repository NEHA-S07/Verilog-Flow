<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verilog Flow</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}

/* HERO SECTION */
.hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 80px 10%;
    min-height: 100vh;
}

/* LEFT SIDE */
.hero-left {
    flex: 1;
    text-align: center;
}

.title {
    font-size: 50px;
    font-weight: bold;
    margin-bottom: 20px;
}

.typing-text {
    font-size: 20px;
    line-height: 1.6;
    max-width: 600px;
    margin: auto;
    min-height: 60px;
}

/* RIGHT SIDE */
.hero-right {
    text-align: center;
}

.profile-pic {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 4px solid white;
    object-fit: cover;
    margin-bottom: 15px;
}

.profile-btn {
    display: inline-block;
    padding: 10px 20px;
    background: #00c6ff;
    color: black;
    text-decoration: none;
    font-weight: bold;
    border-radius: 25px;
    transition: 0.3s;
}

.profile-btn:hover {
    background: white;
}

/* Responsive */
@media (max-width: 900px) {
    .hero {
        flex-direction: column;
        text-align: center;
    }

    .hero-right {
        margin-top: 40px;
    }
}
</style>
</head>

<body>

<header class="hero">

    <!-- LEFT SIDE -->
    <div class="hero-left">
        <h1 class="title">Verilog Flow</h1>
        <p class="typing-text"></p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="hero-right">
        <img src="Profilepicture.jpeg" alt="Profile Picture" class="profile-pic">
        <br>
        <a href="https://www.linkedin.com/in/neha-s-28551326a/" 
           target="_blank" 
           class="profile-btn">
           Visit My Profile
        </a>
    </div>

</header>

<script>
const text = "A structured repository of Verilog HDL programs covering combinational and sequential circuits, FSM design, and verification testbenches for mastering digital design.";

let index = 0;
const speed = 35;

function typeEffect() {
    if (index < text.length) {
        document.querySelector(".typing-text").innerHTML += text.charAt(index);
        index++;
        setTimeout(typeEffect, speed);
    }
}

window.onload = typeEffect;
</script>

</body>
</html>
